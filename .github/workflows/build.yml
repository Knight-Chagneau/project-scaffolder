name: Build Executables

on:
  push:
    branches: [main]
  release:
    types: [created]
  workflow_dispatch:   # déclenchement manuel possible

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
            exe_name: ProjectScaffolder
            artifact: ProjectScaffolder-Linux
          - os: windows-latest
            name: Windows
            exe_name: ProjectScaffolder.exe
            artifact: ProjectScaffolder-Windows

    runs-on: ${{ matrix.os }}
    name: Build — ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: >
          pyinstaller
          --onefile
          --windowed
          --name ProjectScaffolder
          --add-data "config.json${{ matrix.os == 'windows-latest' && ';' || ':' }}."
          --hidden-import "PIL._tkinter_finder"
          app.py

      - name: Copy config.json to dist
        shell: bash
        run: cp config.json dist/config.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.exe_name }}
            dist/config.json
          retention-days: 30
